<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>ChatBot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="src/css/main.css">

    <script src="src/js/main.js"></script>
    
</head>

<body>

    <div class="container py-5">

        <div class="card shadow-lg border-0">

            <div class="card-header text-white text-center header-custom">
                <h4 class="mb-0">MusicBot</h4>
                <small>Sei la saporrakkkk</small>
            </div>

            <div id="chat" class="card-body chat-area">

                <div class="message bot">
                    🎧 Olá! Eu sou o MusicBot. Posso te recomendar músicas, artistas e álbuns!
                </div>

                <div class="message user">
                    Recomende uma música
                </div>

                <div class="message bot">
                    Que tal: Blinding Lights – The Weeknd 🔥
                </div>

                <div class="message user">
                    E uma banda?
                </div>

                <div class="message bot">
                    Recomendo: Arctic Monkeys 🎸
                </div>

            </div>

            <div class="card-footer d-flex gap-2">
                <input type="text" id="userInput" class="form-control" placeholder="Digite sua mensagem...">
                <button id="sendBtn" class="btn">Enviar</button>
            </div>

        </div>

    </div>

    <script src="src/js/main.js"></script>
</body>

</html>
